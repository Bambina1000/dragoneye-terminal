<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no" />
    <title>DragonEye // Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background-color: #050608;
            background-image: url('/static/bg.jpg');
            background-size: cover;
            background-repeat: repeat-y;
            background-position: center 0px;
            animation: slideUp 25s linear infinite;
        }
        @keyframes slideUp {
            from { background-position: center 0px; }
            to { background-position: center -2000px; }
        }
        @media (max-width: 640px) {
            body { animation: none; background-attachment: fixed; }
        }
        .glass-panel {
            background: linear-gradient(135deg, rgba(15, 17, 26, 0.6) 0%, rgba(8, 9, 15, 0.7) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-panel-3d {
            background: linear-gradient(135deg, rgba(20, 24, 38, 0.35) 0%, rgba(10, 12, 20, 0.45) 100%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            border-right: 1px solid rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease-in-out;
        }
        .glass-panel-3d:hover {
            background: linear-gradient(135deg, rgba(25, 30, 48, 0.4) 0%, rgba(12, 15, 24, 0.5) 100%);
            box-shadow: 0 30px 35px -5px rgba(0, 0, 0, 0.7), 0 15px 15px -5px rgba(0, 0, 0, 0.6);
            border-top: 1px solid rgba(99, 102, 241, 0.4);
        }
        .sidebar-icon {
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            transition: all 0.2s;
        }
        .sidebar-icon:hover { background: rgba(255,255,255,0.05); }
        .sidebar-icon.active { background: rgba(99,102,241,0.2); color: #818cf8; }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* filter chips */
        .chip {
            background: rgba(255,255,255,0.05);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .chip.active {
            background: rgba(99,102,241,0.2);
            border-color: #818cf8;
            color: #818cf8;
        }
        .chip:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-gray-200 h-screen w-screen overflow-hidden flex flex-row selection:bg-indigo-500/30 select-none">

    <!-- SIDEBAR -->
    <aside class="w-16 sm:w-20 md:w-24 glass-panel border-r border-white/5 h-full flex flex-col items-center py-4 z-40 flex-shrink-0">
        <a href="/" class="mb-6">
            <img src="/static/logo.jpg" alt="Logo" class="w-8 h-8 sm:w-10 sm:h-10 object-cover rounded-lg border border-indigo-500/30" />
        </a>
        <nav class="flex flex-col items-center gap-4">
            <a href="/" class="sidebar-icon text-gray-400 hover:text-white" title="Dashboard">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </a>
            <a href="/journal" class="sidebar-icon active" title="Journal">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex flex-col flex-grow w-0 overflow-hidden">
        <header class="glass-panel border-b border-white/5 px-4 py-3 z-40 flex-shrink-0">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-sm sm:text-base font-extrabold text-white uppercase flex items-center gap-2">📓 <span>Trading Journal</span></h1>
                    <p class="text-[8px] text-gray-400 tracking-widest uppercase">Track, Review, Improve</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="exportCSV()" class="bg-gray-700 hover:bg-gray-600 text-white font-bold text-[10px] py-1.5 px-3 rounded-md transition-all uppercase tracking-widest border border-gray-600/50">
                        Export CSV
                    </button>
                    <button onclick="openAddTradeModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-[10px] py-1.5 px-4 rounded-md transition-all uppercase tracking-widest border-t border-indigo-400/30 shadow">
                        + Add Trade
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto no-scrollbar px-3 sm:px-6 py-4 max-w-7xl w-full mx-auto pb-24 sm:pb-8">

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                <div class="glass-panel-3d p-4 rounded-xl stat-card">
                    <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Total Trades</p>
                    <p id="stat_total" class="text-xl font-black text-white mt-1">0</p>
                </div>
                <div class="glass-panel-3d p-4 rounded-xl stat-card">
                    <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Win Rate</p>
                    <p id="stat_winrate" class="text-xl font-black text-emerald-400 mt-1">0%</p>
                </div>
                <div class="glass-panel-3d p-4 rounded-xl stat-card">
                    <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Profit Factor</p>
                    <p id="stat_profitfactor" class="text-xl font-black text-white mt-1">0.0</p>
                </div>
                <div class="glass-panel-3d p-4 rounded-xl stat-card">
                    <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Avg P&L</p>
                    <p id="stat_avgpl" class="text-xl font-black text-white mt-1">$0</p>
                </div>
            </div>

            <!-- Extra stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                <div class="glass-panel-3d p-3 rounded-xl stat-card">
                    <p class="text-[7px] text-gray-400 font-bold uppercase tracking-widest">Avg Win</p>
                    <p id="stat_avgwin" class="text-sm font-black text-emerald-400 mt-0.5">$0</p>
                </div>
                <div class="glass-panel-3d p-3 rounded-xl stat-card">
                    <p class="text-[7px] text-gray-400 font-bold uppercase tracking-widest">Avg Loss</p>
                    <p id="stat_avgloss" class="text-sm font-black text-rose-400 mt-0.5">$0</p>
                </div>
                <div class="glass-panel-3d p-3 rounded-xl stat-card">
                    <p class="text-[7px] text-gray-400 font-bold uppercase tracking-widest">Max Drawdown</p>
                    <p id="stat_drawdown" class="text-sm font-black text-rose-400 mt-0.5">$0</p>
                </div>
                <div class="glass-panel-3d p-3 rounded-xl stat-card">
                    <p class="text-[7px] text-gray-400 font-bold uppercase tracking-widest">Best Trade</p>
                    <p id="stat_best" class="text-sm font-black text-emerald-400 mt-0.5">$0</p>
                </div>
            </div>

            <!-- Chart Row: Equity + Monthly + Win/Loss Pie -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
                <!-- Equity Curve -->
                <div class="glass-panel p-4 rounded-xl lg:col-span-2">
                    <h3 class="text-[9px] font-bold uppercase tracking-widest text-gray-400 mb-2">Equity Curve</h3>
                    <div style="position:relative; height:180px;">
                        <canvas id="equityChart"></canvas>
                    </div>
                </div>
                <!-- Monthly Performance -->
                <div class="glass-panel p-4 rounded-xl">
                    <h3 class="text-[9px] font-bold uppercase tracking-widest text-gray-400 mb-2">Monthly P&L</h3>
                    <div style="position:relative; height:180px;">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Win/Loss Pie + Filter -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div class="glass-panel p-4 rounded-xl md:col-span-1">
                    <h3 class="text-[9px] font-bold uppercase tracking-widest text-gray-400 mb-2">Win/Loss</h3>
                    <div style="position:relative; height:150px;">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl md:col-span-3">
                    <div class="flex flex-wrap items-center gap-2 mb-3">
                        <span class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mr-1">Filter:</span>
                        <button class="chip active" data-filter="all" onclick="setFilter('all')">All</button>
                        <button class="chip" data-filter="GBPJPY" onclick="setFilter('GBPJPY')">GBPJPY</button>
                        <button class="chip" data-filter="BTCUSD" onclick="setFilter('BTCUSD')">BTCUSD</button>
                        <button class="chip" data-filter="Long" onclick="setFilter('Long')">Long</button>
                        <button class="chip" data-filter="Short" onclick="setFilter('Short')">Short</button>
                        <button class="chip" data-filter="win" onclick="setFilter('win')">Winners</button>
                        <button class="chip" data-filter="loss" onclick="setFilter('loss')">Losers</button>
                        <select id="monthFilter" onchange="applyMonthFilter()" class="bg-[#090a0f]/60 border border-white/10 rounded-lg px-2 py-1 text-[10px] text-white">
                            <option value="all">All Months</option>
                        </select>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-[10px]">
                            <thead>
                                <tr class="text-gray-400 border-b border-white/5">
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">Date</th>
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">Pair</th>
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">Dir</th>
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">Entry</th>
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">Exit</th>
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">Size</th>
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">P&L</th>
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">Notes</th>
                                    <th class="text-left py-1.5 font-bold uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="trades_body">
                                <tr><td colspan="9" class="text-center py-4 text-gray-500">No trades found.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ADD TRADE MODAL -->
    <div id="addTradeModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="glass-panel w-full max-w-lg rounded-2xl p-6 border border-gray-800/80 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-extrabold text-white uppercase">Add Trade</h2>
                <button onclick="closeAddTradeModal()" class="text-gray-400 hover:text-white text-xs bg-white/5 px-2 py-1 rounded-lg">✕</button>
            </div>
            <form id="tradeForm" onsubmit="saveTrade(event)">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">Date</label>
                        <input type="date" id="trade_date" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50" required />
                    </div>
                    <div>
                        <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">Pair</label>
                        <select id="trade_pair" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50">
                            <option value="GBPJPY">GBPJPY</option>
                            <option value="BTCUSD">BTCUSD</option>
                            <option value="EURUSD">EURUSD</option>
                            <option value="GBPUSD">GBPUSD</option>
                            <option value="USDJPY">USDJPY</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <div>
                        <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">Direction</label>
                        <select id="trade_direction" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50">
                            <option value="Long">Long</option>
                            <option value="Short">Short</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">Size</label>
                        <input type="number" step="0.01" id="trade_size" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50" placeholder="0.01" required />
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <div>
                        <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">Entry Price</label>
                        <input type="number" step="0.0001" id="trade_entry" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50" placeholder="1.2345" required />
                    </div>
                    <div>
                        <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">Exit Price</label>
                        <input type="number" step="0.0001" id="trade_exit" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50" placeholder="1.2345" required />
                    </div>
                </div>
                <div class="mt-2">
                    <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">P&L ($)</label>
                    <input type="number" step="0.01" id="trade_pl" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50" placeholder="0.00" required />
                </div>
                <div class="mt-2">
                    <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">Entry Reason</label>
                    <select id="trade_entry_reason" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50">
                        <option value="">Select reason</option>
                        <option value="Breakout">Breakout</option>
                        <option value="Pullback">Pullback</option>
                        <option value="News">News / Event</option>
                        <option value="Trend">Trend following</option>
                        <option value="Range">Range trade</option>
                    </select>
                </div>
                <div class="mt-2">
                    <label class="text-[8px] text-gray-400 font-bold uppercase tracking-wider">Notes</label>
                    <textarea id="trade_notes" rows="2" class="w-full bg-[#090a0f]/60 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500/50" placeholder="What did you learn?"></textarea>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" onclick="closeAddTradeModal()" class="text-gray-400 text-xs px-4 py-1.5 rounded-md hover:bg-white/5">Cancel</button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-4 py-1.5 rounded-md uppercase tracking-widest shadow">Save Trade</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ---------- STATE ----------
        let trades = [];
        let filteredTrades = [];
        let currentFilter = 'all';
        let chartInstances = {};

        // ---------- LOCAL STORAGE ----------
        function loadTrades() {
            const stored = localStorage.getItem('trades');
            if (stored) {
                try { trades = JSON.parse(stored); } catch (e) { trades = []; }
            } else {
                trades = [
                    { id: Date.now()-100000, date: '2025-01-15', pair: 'GBPJPY', direction: 'Long', entry: 186.50, exit: 187.20, size: 0.1, pl: 70, entryReason: 'Breakout', notes: 'BOJ dovish comments' },
                    { id: Date.now()-80000, date: '2025-01-16', pair: 'BTCUSD', direction: 'Short', entry: 98000, exit: 95000, size: 0.01, pl: 300, entryReason: 'News', notes: 'Rejected at resistance' },
                    { id: Date.now()-60000, date: '2025-01-17', pair: 'GBPJPY', direction: 'Short', entry: 187.50, exit: 186.80, size: 0.2, pl: 140, entryReason: 'Breakout', notes: 'Break of support' },
                    { id: Date.now()-40000, date: '2025-02-10', pair: 'GBPJPY', direction: 'Long', entry: 188.00, exit: 187.50, size: 0.15, pl: -75, entryReason: 'Pullback', notes: 'False breakout' },
                ];
                saveTrades();
            }
            populateMonthFilter();
            applyFilter();
            renderAll();
        }

        function saveTrades() {
            localStorage.setItem('trades', JSON.stringify(trades));
        }

        // ---------- FILTER ----------
        function populateMonthFilter() {
            const months = [...new Set(trades.map(t => t.date.substring(0,7)))].sort();
            const sel = document.getElementById('monthFilter');
            const currentVal = sel.value;
            sel.innerHTML = '<option value="all">All Months</option>';
            months.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                const [year, month] = m.split('-');
                const monthName = new Date(year, month-1).toLocaleString('default', { month: 'long' });
                opt.textContent = `${monthName} ${year}`;
                sel.appendChild(opt);
            });
            if (currentVal && months.includes(currentVal)) sel.value = currentVal;
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            document.querySelector(`.chip[data-filter="${filter}"]`)?.classList.add('active');
            applyFilter();
        }

        function applyMonthFilter() {
            applyFilter();
        }

        function applyFilter() {
            const monthFilter = document.getElementById('monthFilter').value;
            let filtered = trades;

            if (currentFilter !== 'all') {
                if (currentFilter === 'win') filtered = filtered.filter(t => t.pl > 0);
                else if (currentFilter === 'loss') filtered = filtered.filter(t => t.pl < 0);
                else filtered = filtered.filter(t => t.pair === currentFilter || t.direction === currentFilter);
            }
            if (monthFilter !== 'all') {
                filtered = filtered.filter(t => t.date.startsWith(monthFilter));
            }
            filteredTrades = filtered;
            renderTable();
            renderStats();
            renderCharts();
        }

        // ---------- RENDER ----------
        function renderStats() {
            const total = trades.length;
            const wins = trades.filter(t => t.pl > 0).length;
            const losses = trades.filter(t => t.pl < 0).length;
            const winRate = total ? (wins / total * 100) : 0;
            const totalProfit = trades.reduce((sum, t) => sum + (t.pl > 0 ? t.pl : 0), 0);
            const totalLoss = trades.reduce((sum, t) => sum + (t.pl < 0 ? Math.abs(t.pl) : 0), 0);
            const profitFactor = totalLoss ? (totalProfit / totalLoss) : (totalProfit > 0 ? Infinity : 0);
            const avgPl = total ? (trades.reduce((s, t) => s + t.pl, 0) / total) : 0;
            const avgWin = wins ? (trades.filter(t => t.pl > 0).reduce((s, t) => s + t.pl, 0) / wins) : 0;
            const avgLoss = losses ? (trades.filter(t => t.pl < 0).reduce((s, t) => s + t.pl, 0) / losses) : 0;
            const best = trades.length ? Math.max(...trades.map(t => t.pl)) : 0;
            const worst = trades.length ? Math.min(...trades.map(t => t.pl)) : 0;
            // simple drawdown: cumulative min
            let cum = 0, maxCum = 0, drawdown = 0;
            trades.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
                cum += t.pl;
                if (cum > maxCum) maxCum = cum;
                if (cum - maxCum < drawdown) drawdown = cum - maxCum;
            });

            document.getElementById('stat_total').innerText = total;
            document.getElementById('stat_winrate').innerText = winRate.toFixed(1) + '%';
            document.getElementById('stat_profitfactor').innerText = profitFactor === Infinity ? '∞' : profitFactor.toFixed(2);
            document.getElementById('stat_avgpl').innerText = '$' + avgPl.toFixed(2);
            document.getElementById('stat_avgwin').innerText = '$' + avgWin.toFixed(2);
            document.getElementById('stat_avgloss').innerText = '$' + avgLoss.toFixed(2);
            document.getElementById('stat_drawdown').innerText = '$' + Math.abs(drawdown).toFixed(2);
            document.getElementById('stat_best').innerText = '$' + best.toFixed(2);
        }

        function renderTable() {
            const tbody = document.getElementById('trades_body');
            if (filteredTrades.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-gray-500">No trades match the filter.</td></tr>`;
                return;
            }
            const sorted = [...filteredTrades].reverse();
            let html = '';
            sorted.forEach(t => {
                const plClass = t.pl > 0 ? 'text-emerald-400' : (t.pl < 0 ? 'text-rose-400' : 'text-gray-400');
                html += `<tr class="border-b border-white/5 hover:bg-white/5">
                    <td class="py-2">${t.date}</td>
                    <td class="py-2 font-bold">${t.pair}</td>
                    <td class="py-2 ${t.direction === 'Long' ? 'text-emerald-400' : 'text-rose-400'}">${t.direction}</td>
                    <td class="py-2">${t.entry}</td>
                    <td class="py-2">${t.exit}</td>
                    <td class="py-2">${t.size}</td>
                    <td class="py-2 font-bold ${plClass}">${t.pl > 0 ? '+' : ''}${t.pl}</td>
                    <td class="py-2 text-gray-400 text-[10px]">${t.entryReason || ''} ${t.notes || ''}</td>
                    <td class="py-2">
                        <button onclick="deleteTrade(${t.id})" class="text-rose-400 hover:text-rose-300 text-[10px] font-bold">Delete</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // ---------- CHARTS ----------
        function renderCharts() {
            // Equity (using all trades for cumulative)
            const sortedAll = [...trades].sort((a,b) => new Date(a.date) - new Date(b.date));
            const labelsEq = sortedAll.map(t => t.date);
            let cum = 0;
            const eqData = sortedAll.map(t => { cum += t.pl; return cum; });

            const ctxEq = document.getElementById('equityChart').getContext('2d');
            if (chartInstances.equity) chartInstances.equity.destroy();
            chartInstances.equity = new Chart(ctxEq, {
                type: 'line',
                data: {
                    labels: labelsEq.length ? labelsEq : ['No Data'],
                    datasets: [{
                        label: 'Equity',
                        data: labelsEq.length ? eqData : [0],
                        borderColor: '#818cf8',
                        backgroundColor: 'rgba(99,102,241,0.1)',
                        fill: true,
                        tension: 0.2,
                        pointRadius: 2,
                        pointBackgroundColor: '#818cf8',
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#6b7280', font: { size: 8 } }, grid: { color: 'rgba(255,255,255,0.05)' } }, y: { ticks: { color: '#6b7280', font: { size: 8 } }, grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });

            // Monthly bar chart (using filtered trades)
            const months = {};
            filteredTrades.forEach(t => {
                const key = t.date.substring(0,7);
                months[key] = (months[key] || 0) + t.pl;
            });
            const sortedMonths = Object.keys(months).sort();
            const monthLabels = sortedMonths.map(m => {
                const [y, mo] = m.split('-');
                return new Date(y, mo-1).toLocaleString('default', { month: 'short' }) + ' ' + y.slice(2);
            });
            const monthData = sortedMonths.map(m => months[m]);

            const ctxMon = document.getElementById('monthlyChart').getContext('2d');
            if (chartInstances.monthly) chartInstances.monthly.destroy();
            chartInstances.monthly = new Chart(ctxMon, {
                type: 'bar',
                data: {
                    labels: monthLabels.length ? monthLabels : ['No Data'],
                    datasets: [{
                        label: 'P&L',
                        data: monthData.length ? monthData : [0],
                        backgroundColor: monthData.map(v => v >= 0 ? 'rgba(16,185,129,0.7)' : 'rgba(244,63,94,0.7)'),
                        borderColor: monthData.map(v => v >= 0 ? '#10b981' : '#f43f5e'),
                        borderWidth: 1,
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#6b7280', font: { size: 8 } }, grid: { display: false } }, y: { ticks: { color: '#6b7280', font: { size: 8 } }, grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });

            // Pie chart
            const wins = filteredTrades.filter(t => t.pl > 0).length;
            const losses = filteredTrades.filter(t => t.pl < 0).length;

            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (chartInstances.pie) chartInstances.pie.destroy();
            chartInstances.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Wins', 'Losses'],
                    datasets: [{
                        data: [wins, losses],
                        backgroundColor: ['rgba(16,185,129,0.7)', 'rgba(244,63,94,0.7)'],
                        borderColor: ['#10b981', '#f43f5e'],
                        borderWidth: 1,
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af', font: { size: 9 } } } } }
            });
        }

        function renderAll() {
            populateMonthFilter();
            applyFilter(); // calls renderStats, renderTable, renderCharts
        }

        // ---------- CRUD ----------
        function saveTrade(e) {
            e.preventDefault();
            const date = document.getElementById('trade_date').value;
            const pair = document.getElementById('trade_pair').value;
            const direction = document.getElementById('trade_direction').value;
            const entry = parseFloat(document.getElementById('trade_entry').value);
            const exit = parseFloat(document.getElementById('trade_exit').value);
            const size = parseFloat(document.getElementById('trade_size').value);
            const pl = parseFloat(document.getElementById('trade_pl').value);
            const entryReason = document.getElementById('trade_entry_reason').value;
            const notes = document.getElementById('trade_notes').value.trim();

            if (!date || isNaN(entry) || isNaN(exit) || isNaN(size) || isNaN(pl)) {
                alert('Please fill all required fields with valid numbers.');
                return;
            }

            const newTrade = {
                id: Date.now(),
                date,
                pair,
                direction,
                entry,
                exit,
                size,
                pl,
                entryReason,
                notes,
            };
            trades.push(newTrade);
            saveTrades();
            renderAll();
            closeAddTradeModal();
        }

        function deleteTrade(id) {
            if (confirm('Delete this trade?')) {
                trades = trades.filter(t => t.id !== id);
                saveTrades();
                renderAll();
            }
        }

        // ---------- EXPORT CSV ----------
        function exportCSV() {
            if (trades.length === 0) return alert('No trades to export.');
            const headers = ['Date','Pair','Direction','Entry','Exit','Size','P&L','EntryReason','Notes'];
            const rows = trades.map(t => [t.date, t.pair, t.direction, t.entry, t.exit, t.size, t.pl, t.entryReason || '', t.notes || '']);
            const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'journal_export.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ---------- MODAL ----------
        function openAddTradeModal() {
            document.getElementById('addTradeModal').style.display = 'flex';
            document.getElementById('trade_date').value = new Date().toISOString().split('T')[0];
            document.getElementById('tradeForm').reset();
        }
        function closeAddTradeModal() {
            document.getElementById('addTradeModal').style.display = 'none';
        }
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAddTradeModal(); });

        // ---------- INIT ----------
        window.onload = loadTrades;
    </script>
</body>
</html>
